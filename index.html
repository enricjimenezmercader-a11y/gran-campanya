<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gran Campanya</title>
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #1a1208;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'UnifrakturMaguntia', cursive;
    }

    h1 {
      font-family: 'UnifrakturMaguntia', cursive;
      font-size: clamp(2rem, 5vw, 4rem);
      color: #c9a84c;
      letter-spacing: 0.08em;
      text-shadow: 0 0 12px rgba(201,168,76,0.7), 2px 2px 4px #000;
      margin-bottom: 1.2rem;
      text-align: center;
    }

    .main-container {
      display: flex;
      gap: 2rem;
      align-items: stretch;
      position: relative;
    }

    .map-frame {
      border: 6px solid #7a5c1e;
      box-shadow: 0 0 0 2px #3a2a08, 0 0 30px rgba(201,168,76,0.25), inset 0 0 20px rgba(0,0,0,0.5);
      position: relative;
      display: inline-block;
      background: #1a1208;
      flex-shrink: 0;
    }

    .map-frame::before, .map-frame::after {
      content: '';
      position: absolute;
      width: 22px; height: 22px;
      background: #c9a84c;
      clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
      z-index: 2;
    }
    .map-frame::before { top: -13px; left: -13px; }
    .map-frame::after  { bottom: -13px; right: -13px; }

    .corner-tr { top: -13px; right: -13px; }
    .corner-bl { bottom: -13px; left: -13px; }

    .corner-tr, .corner-bl {
      position: absolute;
      width: 22px; height: 22px;
      background: #c9a84c;
      clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
      z-index: 2;
    }

    .map-wrapper {
      position: relative;
      display: inline-block;
      line-height: 0;
    }

    .map-wrapper img {
      display: block;
      max-width: 60vw;
      height: auto;
    }

    #ownership-overlay, #hex-overlay, #army-overlay, #explosion-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    #ownership-overlay {
      pointer-events: auto;
    }

    .army-stack {
      position: absolute;
      width: 30px;
      height: 30px;
      pointer-events: none;
    }

    .army-stack.conflict {
      width: 15px;
      height: 15px;
    }

    .army-image {
      position: absolute;
      width: 30px;
      height: 30px;
      object-fit: contain;
      filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.6));
    }

    .army-stack.conflict .army-image {
      width: 15px;
      height: 15px;
    }

    .army-count {
      position: absolute;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: bold;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.9), -1px -1px 3px rgba(0,0,0,0.9);
      z-index: 2000;
      pointer-events: none;
      left: 0;
      top: 0;
    }

    .army-stack.conflict .army-count {
      width: 15px;
      height: 15px;
      font-size: 8px;
    }

    .side-panel {
      position: fixed;
      right: 0;
      top: 0;
      bottom: 0;
      width: 350px;
      background: linear-gradient(135deg, #2a1f0f 0%, #1a1208 100%);
      border-left: 4px solid #7a5c1e;
      box-shadow: -10px 0 30px rgba(0,0,0,0.8), inset -10px 0 20px rgba(0,0,0,0.5);
      padding: 2rem;
      color: #c9a84c;
      font-family: 'UnifrakturMaguntia', cursive;
      transform: translateX(100%);
      transition: transform 0.3s ease-out;
      overflow-y: auto;
      z-index: 100;
    }

    .side-panel.active {
      transform: translateX(0);
    }

    .side-panel h2 {
      font-size: 1.8rem;
      margin-bottom: 1.5rem;
      text-shadow: 0 0 12px rgba(201,168,76,0.7), 2px 2px 4px #000;
      border-bottom: 2px solid #7a5c1e;
      padding-bottom: 1rem;
    }

    .team-section {
      margin-bottom: 1.5rem;
      padding: 1rem;
      background: rgba(201,168,76,0.05);
      border-left: 4px solid;
      border-radius: 4px;
    }

    .team-section.blue {
      border-color: #5a96ff;
    }

    .team-section.red {
      border-color: #ff4a4a;
    }

    .team-section h3 {
      font-size: 1.2rem;
      margin-bottom: 0.8rem;
      font-weight: bold;
    }

    .team-section.blue h3 {
      color: #5a96ff;
    }

    .team-section.red h3 {
      color: #ff4a4a;
    }

    .army-info {
      margin: 0.5rem 0;
      padding: 0.6rem;
      background: rgba(201,168,76,0.1);
      border-radius: 3px;
      font-size: 0.9rem;
      display: flex;
      justify-content: space-between;
    }

    .army-info-label {
      opacity: 0.8;
    }

    .army-info-value {
      font-weight: bold;
      color: #fff;
    }

    .total-info {
      margin-top: 1.5rem;
      padding: 0.8rem;
      background: rgba(201,168,76,0.15);
      border: 2px solid #c9a84c;
      border-radius: 4px;
    }

    .total-info .army-info {
      background: none;
      margin: 0.3rem 0;
    }

    .close-btn {
      background: #7a5c1e;
      border: 2px solid #c9a84c;
      color: #c9a84c;
      padding: 0.5rem 1rem;
      border-radius: 4px;
      cursor: pointer;
      font-family: 'UnifrakturMaguntia', cursive;
      margin-top: 1.5rem;
      transition: all 0.2s;
      width: 100%;
    }

    .close-btn:hover {
      background: #c9a84c;
      color: #1a1208;
    }

    .overlay-backdrop {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 50;
    }

    .overlay-backdrop.active {
      display: block;
    }
  </style>
</head>
<body>
  <h1>Gran Campanya</h1>
  
  <div class="overlay-backdrop" id="backdrop"></div>

  <div class="main-container">
    <div class="map-frame">
      <span class="corner-tr"></span>
      <span class="corner-bl"></span>
      <div class="map-wrapper">
        <img id="mapImg" src="map.jpg">
        <svg id="ownership-overlay"></svg>
        <svg id="hex-overlay"></svg>
        <div id="explosion-overlay"></div>
        <div id="army-overlay"></div>
      </div>
    </div>
  </div>

  <div id="sidePanel" class="side-panel">
    <h2 id="hexName">Hexagon</h2>
    <div id="armyDetails"></div>
    <button class="close-btn" onclick="closeSidePanel()">Close</button>
  </div>

  <script>
    const img    = document.getElementById('mapImg');
    const svgOwn = document.getElementById('ownership-overlay');
    const svgHex = document.getElementById('hex-overlay');
    const explosionOverlay = document.getElementById('explosion-overlay');
    const armyOverlay = document.getElementById('army-overlay');
    const sidePanel = document.getElementById('sidePanel');
    const backdrop = document.getElementById('backdrop');
    const hexName = document.getElementById('hexName');
    const armyDetails = document.getElementById('armyDetails');

    const COLS = 12, ROWS = 5;
    const waterHexes = new Set(['2_1','3_1','4_0','4_1','5_0','6_0']);
    const SHEET_ID = '12QzDZCtJlhVK7gNPfhPH43MoncUNnSfSvcws1P7z0yo';
    const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

    let teamMap = {};
    let armyMap = {};

    function getTeamTextColor(player) {
      return player < 3 ? '#5a96ff' : '#ff4a4a';
    }

    function parseGVizJSON(text) {
      const map = {};
      const armyData = {};
      const json = JSON.parse(text.replace(/^[^(]+\(/, '').replace(/\);?\s*$/, ''));
      const rows = json.table.rows;
      
      for (const row of rows) {
        if (!row.c || !row.c[0] || !row.c[1]) continue;
        const hex  = (row.c[0].v || '').toString().trim();
        const team = (row.c[1].v || '').toString().trim().toLowerCase();
        if (hex) {
          map[hex] = team;
          armyData[hex] = [];
          // Columns 2-7 are armies for Jugador 1-6 (players 0-5)
          for (let i = 0; i < 6; i++) {
            const count = row.c[i + 2] ? parseInt(row.c[i + 2].v || 0) : 0;
            if (count > 0) {
              armyData[hex].push({ player: i, count: count });
            }
          }
        }
      }
      armyMap = armyData;
      return map;
    }

    function teamOf(col, row) {
      const k = `${col}_${row}`;
      if (waterHexes.has(k)) return null;
      return teamMap[k] || null;
    }

    function flatHexCorners(cx, cy, rv) {
      const pts = [];
      for (let i = 0; i < 6; i++) {
        const angle = Math.PI / 180 * (60 * i);
        pts.push(`${cx + rv * Math.cos(angle)},${cy + rv * Math.sin(angle)}`);
      }
      return pts.join(' ');
    }

    function showHexPanel(col, row) {
      const hexKey = `${col}_${row}`;
      const team = teamOf(col, row);
      
      if (!team) return;

      hexName.textContent = hexKey;
      armyDetails.innerHTML = '';

      const armies = armyMap[hexKey];
      
      if (armies && armies.length > 0) {
        // Group armies by team
        const blueArmies = armies.filter(a => a.player < 3).sort((a, b) => a.player - b.player);
        const redArmies = armies.filter(a => a.player >= 3).sort((a, b) => a.player - b.player);
        
        const blueTotal = blueArmies.reduce((sum, a) => sum + a.count, 0);
        const redTotal = redArmies.reduce((sum, a) => sum + a.count, 0);

        // Blue team section
        if (blueArmies.length > 0) {
          const blueSection = document.createElement('div');
          blueSection.className = 'team-section blue';
          
          const blueTitle = document.createElement('h3');
          blueTitle.textContent = 'Equip Blau';
          blueSection.appendChild(blueTitle);
          
          for (const army of blueArmies) {
            const div = document.createElement('div');
            div.className = 'army-info';
            div.innerHTML = `
              <span class="army-info-label">Jugador ${army.player + 1}</span>
              <span class="army-info-value">${army.count}</span>
            `;
            blueSection.appendChild(div);
          }
          
          armyDetails.appendChild(blueSection);
        }

        // Red team section
        if (redArmies.length > 0) {
          const redSection = document.createElement('div');
          redSection.className = 'team-section red';
          
          const redTitle = document.createElement('h3');
          redTitle.textContent = 'Equip Vermell';
          redSection.appendChild(redTitle);
          
          for (const army of redArmies) {
            const div = document.createElement('div');
            div.className = 'army-info';
            div.innerHTML = `
              <span class="army-info-label">Jugador ${army.player + 1}</span>
              <span class="army-info-value">${army.count}</span>
            `;
            redSection.appendChild(div);
          }
          
          armyDetails.appendChild(redSection);
        }

        // Total section
        const totalDiv = document.createElement('div');
        totalDiv.className = 'total-info';
        
        if (blueTotal > 0) {
          const blueTotalDiv = document.createElement('div');
          blueTotalDiv.className = 'army-info';
          blueTotalDiv.innerHTML = `
            <span class="army-info-label" style="color: #5a96ff;">Equip Blau</span>
            <span class="army-info-value" style="color: #5a96ff;">${blueTotal}</span>
          `;
          totalDiv.appendChild(blueTotalDiv);
        }
        
        if (redTotal > 0) {
          const redTotalDiv = document.createElement('div');
          redTotalDiv.className = 'army-info';
          redTotalDiv.innerHTML = `
            <span class="army-info-label" style="color: #ff4a4a;">Equip Vermell</span>
            <span class="army-info-value" style="color: #ff4a4a;">${redTotal}</span>
          `;
          totalDiv.appendChild(redTotalDiv);
        }

        const grandTotalDiv = document.createElement('div');
        grandTotalDiv.className = 'army-info';
        grandTotalDiv.style.marginTop = '0.5rem';
        grandTotalDiv.style.borderTop = '1px solid #c9a84c';
        grandTotalDiv.style.paddingTop = '0.5rem';
        const grandTotal = blueTotal + redTotal;
        grandTotalDiv.innerHTML = `
          <span class="army-info-label">Total</span>
          <span class="army-info-value">${grandTotal}</span>
        `;
        totalDiv.appendChild(grandTotalDiv);
        
        armyDetails.appendChild(totalDiv);
      }

      sidePanel.classList.add('active');
      backdrop.classList.add('active');
    }

    function closeSidePanel() {
      sidePanel.classList.remove('active');
      backdrop.classList.remove('active');
    }

    function createArmyStack(armies, scale = 1, centerX = 0, centerY = 0) {
      const sortedArmies = [...armies].sort((a, b) => b.count - a.count);
      const totalArmies = sortedArmies.reduce((sum, a) => sum + a.count, 0);

      const stackSize = 30 * scale;
      const stack = document.createElement('div');
      stack.className = scale === 0.5 ? 'army-stack conflict' : 'army-stack';
      stack.style.width = stackSize + 'px';
      stack.style.height = stackSize + 'px';
      stack.style.left = (centerX - stackSize / 2) + 'px';
      stack.style.top = (centerY - stackSize / 2) + 'px';

      let imageIndex = 0;
      for (const army of sortedArmies) {
        for (let i = 0; i < army.count; i++) {
          const armyImg = document.createElement('img');
          armyImg.className = 'army-image';
          armyImg.src = `Equip${army.player}.jpg`;
          armyImg.alt = `Jugador ${army.player + 1}`;
          
          // Stack goes down and to the left from center
          const offsetX = -imageIndex * 4 * scale;
          const offsetY = imageIndex * 4 * scale;
          
          armyImg.style.left = offsetX + 'px';
          armyImg.style.top = offsetY + 'px';
          armyImg.style.width = stackSize + 'px';
          armyImg.style.height = stackSize + 'px';
          armyImg.style.zIndex = 1000 - imageIndex;
          
          stack.appendChild(armyImg);
          imageIndex++;
        }
      }

      // Add total count label
      const countLabel = document.createElement('div');
      countLabel.className = 'army-count';
      countLabel.style.width = stackSize + 'px';
      countLabel.style.height = stackSize + 'px';
      countLabel.style.fontSize = (14 * scale) + 'px';
      countLabel.style.color = getTeamTextColor(sortedArmies[0].player);
      countLabel.textContent = totalArmies;
      
      stack.appendChild(countLabel);
      
      return stack;
    }

    function drawAll() {
      const W = img.offsetWidth;
      const H = img.offsetHeight;

      [svgOwn, svgHex].forEach(s => {
        s.setAttribute('viewBox', `0 0 ${W} ${H}`);
        s.setAttribute('width', W);
        s.setAttribute('height', H);
        s.innerHTML = '';
      });

      explosionOverlay.innerHTML = '';
      armyOverlay.innerHTML = '';

      const rW = W / (2 + 1.5 * (COLS - 1));
      const rH = H / (ROWS * Math.sqrt(3) + 1);
      const r   = Math.min(rW, rH);
      const hexH = Math.sqrt(3) * r;
      const vr  = hexH / 2;

      let blueCount = 0, redCount = 0;

      for (let col = 0; col < COLS; col++) {
        const cx = r + col * 1.5 * r;
        for (let row = 0; row < ROWS; row++) {
          const team = teamOf(col, row);
          if (!team) continue;
          
          const cy = vr + row * hexH + (col % 2 === 1 ? vr : 0);
          const pts = flatHexCorners(cx, cy, r - 1);

          if (team === 'blau') blueCount++;
          else if (team === 'vermell') redCount++;

          // Fill (clickable area)
          const fill = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
          fill.setAttribute('points', pts);
          fill.setAttribute('fill', team === 'blau' ? 'rgba(60,120,220,0.22)' : 'rgba(210,50,50,0.22)');
          fill.setAttribute('stroke', 'none');
          fill.style.cursor = 'pointer';
          
          (function(c, r) {
            fill.addEventListener('click', function(e) {
              e.stopPropagation();
              showHexPanel(c, r);
            });
          })(col, row);
          
          svgOwn.appendChild(fill);

          // Border
          const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
          poly.setAttribute('points', pts);
          poly.setAttribute('fill', 'none');
          poly.setAttribute('stroke', team === 'blau' ? 'rgba(80,150,255,0.85)' : 'rgba(230,70,70,0.85)');
          poly.setAttribute('stroke-width', '2.5');
          poly.setAttribute('pointer-events', 'none');
          svgHex.appendChild(poly);

          // Armies
          const hexKey = `${col}_${row}`;
          const armies = armyMap[hexKey];
          if (armies && armies.length > 0) {
            // Check if there are armies from both teams
            const blueArmies = armies.filter(a => a.player < 3);
            const redArmies = armies.filter(a => a.player >= 3);
            const hasConflict = blueArmies.length > 0 && redArmies.length > 0;

            if (hasConflict) {
              // Add explosion image
              const explosionContainer = document.createElement('div');
              explosionContainer.style.position = 'absolute';
              explosionContainer.style.left = (cx - r * 0.7) + 'px';
              explosionContainer.style.top = (cy - r * 0.7) + 'px';
              explosionContainer.style.width = (r * 1.4) + 'px';
              explosionContainer.style.height = (r * 1.4) + 'px';
              explosionContainer.style.pointerEvents = 'none';
              
              const explosionImg = document.createElement('img');
              explosionImg.src = 'explosion.png';
              explosionImg.style.width = '100%';
              explosionImg.style.height = '100%';
              explosionImg.style.opacity = '0.75';
              explosionImg.style.objectFit = 'contain';
              
              explosionContainer.appendChild(explosionImg);
              explosionOverlay.appendChild(explosionContainer);

              // Blue team stack (left)
              const blueStack = createArmyStack(blueArmies, 0.5, cx - r * 0.5, cy);
              armyOverlay.appendChild(blueStack);

              // Red team stack (right)
              const redStack = createArmyStack(redArmies, 0.5, cx + r * 0.5, cy);
              armyOverlay.appendChild(redStack);
            } else {
              // Single team, normal display
              const stack = createArmyStack(armies, 1, cx, cy);
              armyOverlay.appendChild(stack);
            }
          }
        }
      }

      document.getElementById('blue-count').textContent = blueCount;
      document.getElementById('red-count').textContent  = redCount;
    }

    async function loadAndDraw() {
      try {
        const res = await fetch(SHEET_URL);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const text = await res.text();
        teamMap = parseGVizJSON(text);
      } catch(e) {
        console.error('Error loading sheet:', e);
      }
      if (img.complete) {
        drawAll();
      } else {
        img.addEventListener('load', drawAll);
      }
    }

    loadAndDraw();
    window.addEventListener('resize', drawAll);
    backdrop.addEventListener('click', closeSidePanel);
  </script>

  <div style="display:flex;gap:2.5rem;margin-top:1rem;font-family:'UnifrakturMaguntia',cursive;font-size:1.15rem;text-shadow:1px 1px 3px #000;">
    <span style="color:#4a96ff;">&#9632; Equip Blau &mdash; <span id="blue-count">27</span> hex</span>
    <span style="color:#e64646;">&#9632; Equip Vermell &mdash; <span id="red-count">27</span> hex</span>
  </div>
</body>
</html>
