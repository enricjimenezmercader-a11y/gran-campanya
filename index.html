<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <title>Test 1: Data Loading</title>
  <style>
    body { background: #1a1208; color: #c9a84c; font-family: Arial; padding: 20px; }
    pre { background: #000; padding: 10px; overflow-x: auto; }
  </style>
</head>
<body>
  <h1>Test 1: Data Loading</h1>
  <p>Loading spreadsheet data...</p>
  <pre id="output"></pre>

  <script>
    const SHEET_ID = '12QzDZCtJlhVK7gNPfhPH43MoncUNnSfSvcws1P7z0yo';
    const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
    
    async function loadData() {
      try {
        const res = await fetch(SHEET_URL);
        const text = await res.text();
        const json = JSON.parse(text.replace(/^[^(]+\(/, '').replace(/\);?\s*$/, ''));
        
        const log = document.getElementById('output');
        log.textContent = `✓ Data loaded successfully\n\n`;
        log.textContent += `Rows: ${json.table.rows.length}\n\n`;
        
        // Show first few rows
        log.textContent += 'First 5 rows:\n';
        for (let i = 0; i < Math.min(5, json.table.rows.length); i++) {
          const row = json.table.rows[i];
          log.textContent += `Row ${i}: ${JSON.stringify(row.c.map(c => c.v))}\n`;
        }
      } catch (e) {
        document.getElementById('output').textContent = `✗ ERROR: ${e.message}`;
      }
    }
    
    loadData();
  </script>
</body>
</html>
