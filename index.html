<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <title>Test 2: SVG Click Handling</title>
  <style>
    body { background: #1a1208; color: #c9a84c; font-family: Arial; padding: 20px; }
    svg { border: 2px solid #7a5c1e; }
    pre { background: #000; padding: 10px; color: #0f0; font-family: monospace; margin-top: 20px; min-height: 200px; }
  </style>
</head>
<body>
  <h1>Test 2: SVG Click Handling</h1>
  <p>Click on the hexagons below:</p>
  
  <svg id="svg" width="400" height="400" viewBox="0 0 400 400"></svg>
  
  <pre id="output">Click events will appear here...</pre>

  <script>
    const svg = document.getElementById('svg');
    const output = document.getElementById('output');
    let clickCount = 0;

    // Create some simple hexagons
    function createHexagon(cx, cy, r, id) {
      const pts = [];
      for (let i = 0; i < 6; i++) {
        const angle = Math.PI / 180 * (60 * i);
        pts.push(`${cx + r * Math.cos(angle)},${cy + r * Math.sin(angle)}`);
      }
      
      const polygon = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
      polygon.setAttribute('points', pts.join(' '));
      polygon.setAttribute('fill', 'rgba(60,120,220,0.22)');
      polygon.setAttribute('stroke', '#5a96ff');
      polygon.setAttribute('stroke-width', '2');
      polygon.style.cursor = 'pointer';
      
      polygon.addEventListener('click', function(e) {
        clickCount++;
        e.stopPropagation();
        const msg = `✓ CLICK #${clickCount}: Hexagon ${id} clicked!`;
        output.textContent += msg + '\n';
        output.scrollTop = output.scrollHeight;
        console.log(msg);
      });
      
      svg.appendChild(polygon);
    }

    // Create 3 hexagons
    createHexagon(100, 100, 50, 1);
    createHexagon(250, 100, 50, 2);
    createHexagon(175, 220, 50, 3);

    output.textContent = '✓ SVG created with 3 hexagons. Try clicking them...\n';
  </script>
</body>
</html>
