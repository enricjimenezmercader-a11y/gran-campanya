    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #1a1208;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;

      font-family: 'UnifrakturMaguntia', cursive;
      padding: 20px;
    }

    h1 {
      color: #c9a84c;
      margin-bottom: 10px;
      text-shadow: 0 0 12px rgba(201,168,76,0.7);
    }

    .version {
      color: #7a5c1e;
      font-size: 0.8rem;
      margin-bottom: 20px;
    }

    .container {
      display: flex;
      gap: 30px;
      max-width: 1600px;
      width: 100%;
    }

    .panel {
      width: 300px;
      background: #2a1f0f;
      border: 2px solid #7a5c1e;
      padding: 20px;
      color: #c9a84c;
      font-family: 'Times New Roman', serif;

      max-height: 75vh;
      overflow-y: auto;

    .panel h2 {

      padding-bottom: 10px;
    }

    .team-section {
      margin-bottom: 15px;
    }

    .team-section h3 {
      font-size: 1rem;
      margin: 15px 0 10px 0;
      padding-bottom: 5px;
      border-bottom: 1px solid rgba(201,168,76,0.3);
    }

    .team-section.blue h3 { color: #5a96ff; }
    .team-section.red h3 { color: #ff4a4a; }

    .player-btn {
      display: block;
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      background: #1a1208;
      border: 2px solid #7a5c1e;
      color: #c9a84c;
      cursor: pointer;
      border-radius: 3px;
      transition: all 0.2s;
      font-weight: bold;
      font-size: 0.9rem;
    }

    .player-btn:hover {
      background: #7a5c1e;
    }

    .player-btn.active {
      background: #c9a84c;
      color: #1a1208;
      border-color: #c9a84c;
    }

    .player-info {
      margin-top: 10px;
      padding: 10px;
      background: rgba(201,168,76,0.1);
      border-left: 3px solid #c9a84c;
      border-radius: 2px;
      font-size: 0.85rem;
    }

    .status {
      margin-top: 20px;
      padding: 15px;
      background: #1a1208;
      border: 1px solid #7a5c1e;
      border-radius: 3px;
      font-size: 0.9rem;
    }

    .status-label {
      color: #7a5c1e;
      font-size: 0.8rem;
      margin-bottom: 5px;
    }

    .status-value {
      color: #fff;
      font-size: 1.1rem;
      font-weight: bold;
    }
