<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gran Campanya - WWII Strategic Battle</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #0a0a0a;
      background-image: 
        linear-gradient(45deg, rgba(139,69,19,0.1) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(139,69,19,0.1) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(139,69,19,0.1) 75%),
        linear-gradient(-45deg, transparent 75%, rgba(139,69,19,0.1) 75%);
      background-size: 60px 60px;
      background-position: 0 0, 0 30px, 30px -30px, -30px 0px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Roboto', sans-serif;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(ellipse at 20% 50%, rgba(255,165,0,0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(220,20,60,0.08) 0%, transparent 50%);
      pointer-events: none;
      z-index: 1;
    }

    .content {
      position: relative;
      z-index: 10;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.5rem;
    }

    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      margin-top: 2rem;
    }

    h1 {
      font-family: 'Oswald', sans-serif;
      font-size: clamp(2.5rem, 10vw, 5rem);
      color: #ffcc00;
      letter-spacing: 0.15em;
      font-weight: 700;
      text-shadow: 
        0 0 20px rgba(255,204,0,0.8),
        0 0 40px rgba(255,100,0,0.4),
        3px 3px 0 #000,
        6px 6px 0 rgba(0,0,0,0.5);
      margin: 0;
      animation: militaryPulse 3s ease-in-out infinite;
      text-transform: uppercase;
      letter-spacing: 0.2em;
    }

    @keyframes militaryPulse {
      0%, 100% { 
        text-shadow: 
          0 0 20px rgba(255,204,0,0.8),
          0 0 40px rgba(255,100,0,0.4),
          3px 3px 0 #000,
          6px 6px 0 rgba(0,0,0,0.5);
      }
      50% { 
        text-shadow: 
          0 0 30px rgba(255,204,0,1),
          0 0 60px rgba(255,100,0,0.6),
          3px 3px 0 #000,
          6px 6px 0 rgba(0,0,0,0.7);
      }
    }

    .subtitle {
      font-family: 'Oswald', sans-serif;
      font-size: 1.4rem;
      color: #cc3333;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-shadow: 2px 2px 4px #000;
      margin: 0;
      text-transform: uppercase;
      animation: fadeInScale 0.8s ease-out;
    }

    @keyframes fadeInScale {
      from {
        opacity: 0;
        transform: scale(0.8);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .tagline {
      font-family: 'Roboto', sans-serif;
      font-size: 1rem;
      color: #888;
      font-style: italic;
      letter-spacing: 0.05em;
      margin-top: 0.5rem;
    }

    .divider {
      width: 150px;
      height: 3px;
      background: linear-gradient(90deg, transparent, #ffcc00, #cc3333, #ffcc00, transparent);
      margin: 1rem 0;
      box-shadow: 0 0 10px rgba(255,204,0,0.5);
    }

    .map-marker {
      display: inline-block;
      width: 30px;
      height: 30px;
      background: radial-gradient(circle at 30% 30%, #ffcc00, #ff8800);
      border-radius: 50%;
      margin: 0 0.5rem;
      box-shadow: 0 0 15px rgba(255,204,0,0.7);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% {
        box-shadow: 0 0 15px rgba(255,204,0,0.7);
        transform: scale(1);
      }
      50% {
        box-shadow: 0 0 25px rgba(255,204,0,1);
        transform: scale(1.1);
      }
    }

    .players-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.5rem;
      max-width: 900px;
      width: 100%;
    }

    .player-card {
      background: linear-gradient(135deg, rgba(51,51,51,0.6) 0%, rgba(0,0,0,0.8) 100%);
      border: 3px solid #ffcc00;
      border-radius: 2px;
      padding: 2rem 1.5rem;
      box-shadow: 0 0 20px rgba(255,204,0,0.3);
      transition: all 0.3s ease;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .player-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,204,0,0.2), transparent);
      transition: left 0.5s ease;
      z-index: 1;
    }

    .player-card:hover::before {
      left: 100%;
    }

    .player-card:hover {
      background: linear-gradient(135deg, rgba(255,204,0,0.15) 0%, rgba(255,100,0,0.1) 100%);
      transform: translateY(-5px);
      box-shadow: 0 8px 30px rgba(255,204,0,0.5);
    }

    .player-number {
      font-family: 'Oswald', sans-serif;
      font-size: 2.5rem;
      color: #ffcc00;
      font-weight: 700;
      margin-bottom: 0.5rem;
      text-shadow: 0 0 10px rgba(255,204,0,0.5);
    }

    .player-name {
      font-family: 'Oswald', sans-serif;
      font-size: 1.1rem;
      color: #ffcc00;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .player-email {
      font-family: 'Roboto', sans-serif;
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 1rem;
      word-break: break-all;
    }

    .player-team {
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .player-team.blue {
      color: #5a96ff;
    }

    .player-team.red {
      color: #ff4a4a;
    }

    .btn-access {
      padding: 0.9rem 1.5rem;
      font-family: 'Oswald', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      background: linear-gradient(135deg, #ffcc00 0%, #ff8800 100%);
      color: #000;
      border: 2px solid #ffff00;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      width: 100%;
      box-shadow: 0 4px 8px rgba(0,0,0,0.5);
    }

    .btn-access:hover {
      background: linear-gradient(135deg, #ffff00 0%, #ffaa00 100%);
      transform: scale(1.05);
      box-shadow: 0 6px 12px rgba(0,0,0,0.7);
    }

    .btn-access:active {
      transform: scale(0.98);
    }

    .btn-access:disabled {
      background: #666;
      color: #999;
      cursor: not-allowed;
      opacity: 0.6;
    }

    .footer {
      position: fixed;
      bottom: 20px;
      width: 100%;
      text-align: center;
      font-family: 'Oswald', sans-serif;
      font-size: 0.85rem;
      color: #666;
      z-index: 5;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .version-badge {
      font-size: 0.75rem;
      opacity: 0.6;
      margin-top: 0.5rem;
    }

    .military-stripe {
      position: fixed;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, #ffcc00, #cc3333, #ffcc00);
      top: 0;
      left: 0;
      z-index: 20;
      box-shadow: 0 0 20px rgba(255,204,0,0.5);
    }

    /* Modal Styles */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.8);
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal-content {
      background: linear-gradient(135deg, rgba(51,51,51,0.95) 0%, rgba(0,0,0,0.95) 100%);
      margin: 10% auto;
      padding: 2rem;
      border: 3px solid #ffcc00;
      border-radius: 2px;
      width: 90%;
      max-width: 500px;
      box-shadow: 0 0 40px rgba(255,204,0,0.5);
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        transform: translateY(-50px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .modal h2 {
      font-family: 'Oswald', sans-serif;
      color: #ffcc00;
      margin-bottom: 1.5rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-size: 1.5rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      color: #ffcc00;
      margin-bottom: 0.5rem;
      font-weight: 700;
      font-family: 'Oswald', sans-serif;
      text-transform: uppercase;
      font-size: 0.9rem;
    }

    .form-group input {
      width: 100%;
      padding: 0.8rem;
      background: rgba(0,0,0,0.5);
      border: 2px solid #ffcc00;
      color: #fff;
      font-family: 'Roboto', sans-serif;
      border-radius: 2px;
      font-size: 1rem;
    }

    .form-group input:focus {
      outline: none;
      box-shadow: 0 0 10px rgba(255,204,0,0.5);
      background: rgba(0,0,0,0.7);
    }

    .form-group input::placeholder {
      color: #666;
    }

    .btn-modal {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, #ffcc00 0%, #ff8800 100%);
      color: #000;
      border: 2px solid #ffff00;
      border-radius: 2px;
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      transition: all 0.3s ease;
      margin-bottom: 0.5rem;
    }

    .btn-modal:hover {
      background: linear-gradient(135deg, #ffff00 0%, #ffaa00 100%);
      transform: scale(1.02);
    }

    .btn-modal:disabled {
      background: #666;
      color: #999;
      cursor: not-allowed;
      opacity: 0.6;
    }

    .btn-cancel {
      background: linear-gradient(135deg, #333333 0%, #1a1a1a 100%);
      color: #ffcc00;
      border-color: #666666;
    }

    .btn-cancel:hover {
      background: linear-gradient(135deg, #555555 0%, #333333 100%);
      border-color: #ffcc00;
    }

    .error-message {
      color: #ff4a4a;
      text-align: center;
      margin-top: 1rem;
      font-weight: 700;
      display: none;
    }

    .success-message {
      color: #90ff90;
      text-align: center;
      margin-top: 1rem;
      font-weight: 700;
      display: none;
      line-height: 1.6;
    }

    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,204,0,0.3);
      border-radius: 50%;
      border-top-color: #ffcc00;
      animation: spin 0.8s linear infinite;
      margin-right: 0.5rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .close {
      color: #ffcc00;
      float: right;
      font-size: 2rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .close:hover {
      color: #ff8800;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: clamp(1.8rem, 8vw, 3rem);
      }

      .players-grid {
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 1rem;
      }

      .player-card {
        padding: 1.5rem 1rem;
      }

      .player-number {
        font-size: 2rem;
      }

      .modal-content {
        margin: 20% auto;
        width: 95%;
        padding: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="military-stripe"></div>

  <div class="content">
    <div class="header">
      <h1>Gran Campanya</h1>
      <div class="divider"></div>
      <div style="display: flex; align-items: center; justify-content: center;">
        <div class="map-marker"></div>
        <p class="subtitle">WWII Strategic Battle</p>
        <div class="map-marker"></div>
      </div>
      <p class="tagline">⚔️ Select Your Command ⚔️</p>
    </div>

    <div class="players-grid" id="playersGrid">
      <!-- Players will be loaded here -->
    </div>
  </div>

  <!-- Validation Modal -->
  <div id="validationModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeValidationModal()">&times;</span>
      <h2>✓ Validació</h2>
      
      <div class="form-group">
        <label>Comandant: <span id="commanderName"></span></label>
      </div>

      <div class="form-group">
        <label>Correu: <span id="commanderEmail" style="color: #888; font-family: 'Roboto', sans-serif; text-transform: none; font-size: 0.9rem;"></span></label>
      </div>

      <div class="form-group">
        <label>Codi de Validació:</label>
        <input type="text" id="codeInput" placeholder="Introduïu el codi rebut al correu" maxlength="6">
      </div>

      <button class="btn-modal" onclick="verifyCode()" id="verifyBtn">Verificar Codi</button>
      <button class="btn-modal btn-cancel" onclick="closeValidationModal()">Cancel·lar</button>

      <div class="error-message" id="validationError"></div>
      <div class="success-message" id="validationSuccess"></div>
    </div>
  </div>

  <div class="footer">
    <p>© 2026 • Gran Campanya Command Center</p>
    <div class="version-badge">VERSION 1.0</div>
  </div>

  <script>
    let currentPlayer = null;
    let playersData = {};
    let validationCodes = {};

    // Load player data from spreadsheet
    async function loadPlayerData() {
      try {
        const SHEET_ID = '12QzDZCtJlhVK7gNPfhPH43MoncUNnSfSvcws1P7z0yo';
        const PLAYER_SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=234059431`;
        
        const res = await fetch(PLAYER_SHEET_URL);
        const text = await res.text();
        const json = JSON.parse(text.replace(/^[^(]+\(/, '').replace(/\);?\s*$/, ''));
        const rows = json.table.rows;

        // Player configuration
        const playerConfig = [
          { team: 'blue', icon: '🔵' },
          { team: 'blue', icon: '🔵' },
          { team: 'blue', icon: '🔵' },
          { team: 'red', icon: '🔴' },
          { team: 'red', icon: '🔴' },
          { team: 'red', icon: '🔴' }
        ];

        // Load player names and emails
        for (let i = 0; i < 6; i++) {
          const rowIndex = i + 1;
          let name = `Jugador ${i + 1}`;
          let email = '';

          if (rows[rowIndex] && rows[rowIndex].c) {
            // Column B (index 1) = Name
            if (rows[rowIndex].c[1] && rows[rowIndex].c[1].v) {
              const customName = rows[rowIndex].c[1].v.toString().trim();
              if (customName) name = customName;
            }

            // Column C (index 2) = Email
            if (rows[rowIndex].c[2] && rows[rowIndex].c[2].v) {
              email = rows[rowIndex].c[2].v.toString().trim();
            }
          }

          playersData[i] = {
            name: name,
            email: email,
            team: playerConfig[i].team,
            icon: playerConfig[i].icon,
            number: i + 1
          };
        }

        renderPlayers();
      } catch(e) {
        console.error('Error loading player data:', e);
      }
    }

    function renderPlayers() {
      const grid = document.getElementById('playersGrid');
      grid.innerHTML = '';

      for (let i = 0; i < 6; i++) {
        const player = playersData[i];
        const teamLabel = player.team === 'blue' ? 'EQUIP BLAU' : 'EQUIP VERMELL';

        const card = document.createElement('div');
        card.className = 'player-card';
        card.onclick = () => openValidationModal(i);

        card.innerHTML = `
          <div class="player-number">${player.number}</div>
          <div class="player-name">${player.name}</div>
          <div class="player-email">${player.email}</div>
          <div class="player-team ${player.team}">${player.icon} ${teamLabel}</div>
          <button class="btn-access">Accedir</button>
        `;

        grid.appendChild(card);
      }
    }

    function generateCode() {
      return Math.floor(Math.random() * 1000000).toString().padStart(6, '0');
    }

    function openValidationModal(playerNum) {
      currentPlayer = playerNum;
      const player = playersData[playerNum];

      // Update modal with player info
      document.getElementById('commanderName').textContent = `${player.name} (Jugador ${playerNum + 1})`;
      document.getElementById('commanderEmail').textContent = player.email || 'No disponible';
      document.getElementById('codeInput').value = '';
      document.getElementById('validationError').style.display = 'none';
      document.getElementById('validationSuccess').style.display = 'none';

      // Generate validation code
      const code = generateCode();
      validationCodes[playerNum] = code;

      // Show test code (in production, this would be sent via email)
      const successDiv = document.getElementById('validationSuccess');
      successDiv.innerHTML = `
        📧 Codi de Validació Enviat<br>
        <small style="color: #aaa;">Test: <strong style="color: #ffcc00;">${code}</strong></small>
      `;
      successDiv.style.display = 'block';

      document.getElementById('validationModal').style.display = 'block';
      document.getElementById('codeInput').focus();
    }

    function closeValidationModal() {
      document.getElementById('validationModal').style.display = 'none';
      currentPlayer = null;
    }

    function verifyCode() {
      const enteredCode = document.getElementById('codeInput').value.trim();
      const expectedCode = validationCodes[currentPlayer];
      const errorDiv = document.getElementById('validationError');
      const verifyBtn = document.getElementById('verifyBtn');

      if (!enteredCode) {
        errorDiv.textContent = '❌ Introduïu el codi';
        errorDiv.style.display = 'block';
        return;
      }

      if (enteredCode === expectedCode) {
        // Code is valid - redirect to ordres.html with player ID
        verifyBtn.disabled = true;
        verifyBtn.innerHTML = '<span class="loading-spinner"></span>Accedint...';

        setTimeout(() => {
          const player = playersData[currentPlayer];
          window.location.href = `ordres.html?player=${currentPlayer}&email=${encodeURIComponent(player.email)}&name=${encodeURIComponent(player.name)}`;
        }, 1000);
      } else {
        errorDiv.textContent = '❌ Codi incorrecte';
        errorDiv.style.display = 'block';
      }
    }

    // Allow Enter key to submit
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('codeInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') verifyCode();
      });

      loadPlayerData();
    });

    // Close modal when clicking outside
    window.onclick = function(event) {
      const modal = document.getElementById('validationModal');
      if (event.target == modal) {
        closeValidationModal();
      }
    }
  </script>
</body>
</html>
