<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gran Campanya</title>
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #1a1208;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'UnifrakturMaguntia', cursive;
    }

    h1 {
      font-family: 'UnifrakturMaguntia', cursive;
      font-size: clamp(2rem, 5vw, 4rem);
      color: #c9a84c;
      letter-spacing: 0.08em;
      text-shadow: 0 0 12px rgba(201,168,76,0.7), 2px 2px 4px #000;
      margin-bottom: 1.2rem;
      text-align: center;
    }

    .container {
      display: flex;
      gap: 2rem;
      align-items: flex-start;
    }

    .map-frame {
      border: 6px solid #7a5c1e;
      box-shadow: 0 0 0 2px #3a2a08, 0 0 30px rgba(201,168,76,0.25), inset 0 0 20px rgba(0,0,0,0.5);
      position: relative;
      display: inline-block;
      background: #1a1208;
    }

    .map-frame::before, .map-frame::after {
      content: '';
      position: absolute;
      width: 22px; height: 22px;
      background: #c9a84c;
      clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
      z-index: 2;
    }
    .map-frame::before { top: -13px; left: -13px; }
    .map-frame::after  { bottom: -13px; right: -13px; }

    .corner-tr { top: -13px; right: -13px; }
    .corner-bl { bottom: -13px; left: -13px; }

    .corner-tr, .corner-bl {
      position: absolute;
      width: 22px; height: 22px;
      background: #c9a84c;
      clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
      z-index: 2;
    }

    .map-wrapper {
      position: relative;
      display: inline-block;
      line-height: 0;
    }

    .map-wrapper img {
      display: block;
      max-width: 90vw;
      height: auto;
    }

    #ownership-overlay, #hex-overlay, #army-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    #hex-overlay {
      pointer-events: auto;
      cursor: pointer;
    }

    .army-stack {
      position: absolute;
      width: 30px;
      height: 30px;
    }

    .army-image {
      position: absolute;
      width: 30px;
      height: 30px;
      object-fit: contain;
      filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.6));
    }

    .side-panel {
      display: none;
      background: linear-gradient(135deg, #2a1f0f 0%, #1a1208 100%);
      border: 4px solid #7a5c1e;
      box-shadow: 0 0 0 2px #3a2a08, 0 0 30px rgba(201,168,76,0.25), inset 0 0 20px rgba(0,0,0,0.5);
      padding: 2rem;
      min-width: 300px;
      border-radius: 8px;
      color: #c9a84c;
      font-family: 'UnifrakturMaguntia', cursive;
    }

    .side-panel.active {
      display: block;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .side-panel h2 {
      font-size: 1.8rem;
      margin-bottom: 1.5rem;
      text-shadow: 0 0 12px rgba(201,168,76,0.7), 2px 2px 4px #000;
      border-bottom: 2px solid #7a5c1e;
      padding-bottom: 1rem;
    }

    .army-info {
      margin: 1rem 0;
      padding: 0.8rem;
      background: rgba(201,168,76,0.1);
      border-left: 3px solid #c9a84c;
      border-radius: 4px;
    }

    .army-info-label {
      font-size: 0.9rem;
      opacity: 0.8;
      margin-bottom: 0.3rem;
    }

    .army-info-value {
      font-size: 1.3rem;
      font-weight: bold;
      color: #fff;
    }

    .close-btn {
      background: #7a5c1e;
      border: 2px solid #c9a84c;
      color: #c9a84c;
      padding: 0.5rem 1rem;
      border-radius: 4px;
      cursor: pointer;
      font-family: 'UnifrakturMaguntia', cursive;
      margin-top: 1.5rem;
      transition: all 0.2s;
    }

    .close-btn:hover {
      background: #c9a84c;
      color: #1a1208;
    }

    .hex-clickable {
      cursor: pointer;
    }

    .hex-clickable:hover {
      stroke-width: 4 !important;
    }
  </style>
</head>
<body>
  <h1>Gran Campanya</h1>
  <div class="container">
    <div class="map-frame">
      <span class="corner-tr"></span>
      <span class="corner-bl"></span>
      <div class="map-wrapper">
        <img id="mapImg" src="map.jpg">
        <svg id="ownership-overlay"></svg>
        <svg id="hex-overlay"></svg>
        <div id="army-overlay"></div>
      </div>
    </div>

    <div id="sidePanel" class="side-panel">
      <h2 id="hexName">Hexagon</h2>
      <div id="armyDetails"></div>
      <button class="close-btn" onclick="closeSidePanel()">Close</button>
    </div>
  </div>

  <script>
    const img    = document.getElementById('mapImg');
    const svgOwn = document.getElementById('ownership-overlay');
    const svgHex = document.getElementById('hex-overlay');
    const armyOverlay = document.getElementById('army-overlay');
    const sidePanel = document.getElementById('sidePanel');
    const hexName = document.getElementById('hexName');
    const armyDetails = document.getElementById('armyDetails');

    const COLS = 12, ROWS = 5;
    const waterHexes = new Set(['2_1','3_1','4_0','4_1','5_0','6_0']);
    const SHEET_ID = '12QzDZCtJlhVK7gNPfhPH43MoncUNnSfSvcws1P7z0yo';
    const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

    let teamMap = {};
    let armyMap = {};

    function parseGVizJSON(text) {
      const map = {};
      const armyData = {};
      const json = JSON.parse(text.replace(/^[^(]+\(/, '').replace(/\);?\s*$/, ''));
      const rows = json.table.rows;
      
      for (const row of rows) {
        if (!row.c || !row.c[0] || !row.c[1]) continue;
        const hex  = (row.c[0].v || '').toString().trim();
        const team = (row.c[1].v || '').toString().trim().toLowerCase();
        if (hex) {
          map[hex] = team;
          armyData[hex] = [];
          for (let i = 2; i <= 7; i++) {
            const count = row.c[i] ? parseInt(row.c[i].v || 0) : 0;
            if (count > 0) {
              armyData[hex].push({ player: i - 1, count: count });
            }
          }
        }
      }
      armyMap = armyData;
      return map;
    }

    function teamOf(col, row) {
      const k = `${col}_${row}`;
      if (waterHexes.has(k)) return null;
      return teamMap[k] || null;
    }

    function flatHexCorners(cx, cy, rv) {
      const pts = [];
      for (let i = 0; i < 6; i++) {
        const angle = Math.PI / 180 * (60 * i);
        pts.push(`${cx + rv * Math.cos(angle)},${cy + rv * Math.sin(angle)}`);
      }
      return pts.join(' ');
    }

    function showHexPanel(col, row) {
      const hexKey = `${col}_${row}`;
      const team = teamOf(col, row);
      
      if (!team) return;

      hexName.textContent = hexKey;
      armyDetails.innerHTML = '';

      const armies = armyMap[hexKey];
      if (armies && armies.length > 0) {
        const sortedArmies = [...armies].sort((a, b) => b.count - a.count);
        
        for (const army of sortedArmies) {
          const div = document.createElement('div');
          div.className = 'army-info';
          div.innerHTML = `
            <div class="army-info-label">Jugador ${army.player}</div>
            <div class="army-info-value">${army.count} armies</div>
          `;
          armyDetails.appendChild(div);
        }

        const totalDiv = document.createElement('div');
        totalDiv.className = 'army-info';
        totalDiv.style.marginTop = '1.5rem';
        totalDiv.style.borderLeft = '3px solid #fff';
        const totalCount = sortedArmies.reduce((sum, a) => sum + a.count, 0);
        totalDiv.innerHTML = `
          <div class="army-info-label">Total</div>
          <div class="army-info-value">${totalCount} armies</div>
        `;
        armyDetails.appendChild(totalDiv);
      } else {
        armyDetails.innerHTML = '<div class="army-info"><div class="army-info-label">No armies</div></div>';
      }

      sidePanel.classList.add('active');
    }

    function closeSidePanel() {
      sidePanel.classList.remove('active');
    }

    function drawAll() {
      const W = img.offsetWidth;
      const H = img.offsetHeight;

      [svgOwn, svgHex].forEach(s => {
        s.setAttribute('viewBox', `0 0 ${W} ${H}`);
        s.setAttribute('width', W);
        s.setAttribute('height', H);
        s.innerHTML = '';
      });

      armyOverlay.innerHTML = '';

      const rW = W / (2 + 1.5 * (COLS - 1));
      const rH = H / (ROWS * Math.sqrt(3) + 1);
      const r   = Math.min(rW, rH);
      const hexH = Math.sqrt(3) * r;
      const vr  = hexH / 2;

      let blueCount = 0, redCount = 0;

      for (let col = 0; col < COLS; col++) {
        const cx = r + col * 1.5 * r;
        for (let row = 0; row < ROWS; row++) {
          const team = teamOf(col, row);
          if (!team) continue;
          
          const cy = vr + row * hexH + (col % 2 === 1 ? vr : 0);
          const pts = flatHexCorners(cx, cy, r - 1);

          if (team === 'blau') blueCount++;
          else if (team === 'vermell') redCount++;

          const fill = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
          fill.setAttribute('points', pts);
          fill.setAttribute('fill', team === 'blau' ? 'rgba(60,120,220,0.22)' : 'rgba(210,50,50,0.22)');
          fill.setAttribute('stroke', 'none');
          svgOwn.appendChild(fill);

          const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
          poly.setAttribute('points', pts);
          poly.setAttribute('fill', 'none');
          poly.setAttribute('stroke', team === 'blau' ? 'rgba(80,150,255,0.85)' : 'rgba(230,70,70,0.85)');
          poly.setAttribute('stroke-width', '2.5');
          poly.setAttribute('class', 'hex-clickable');
          poly.setAttribute('data-col', col);
          poly.setAttribute('data-row', row);
          poly.addEventListener('click', () => showHexPanel(col, row));
          svgHex.appendChild(poly);

          const hexKey = `${col}_${row}`;
          const armies = armyMap[hexKey];
          if (armies && armies.length > 0) {
            const sortedArmies = [...armies].sort((a, b) => b.count - a.count);

            const stack = document.createElement('div');
            stack.className = 'army-stack';
            stack.style.left = (cx - 15) + 'px';
            stack.style.top = (cy - 15) + 'px';

            let imageIndex = 0;
            for (const army of sortedArmies) {
              for (let i = 0; i < army.count; i++) {
                const armyImg = document.createElement('img');
                armyImg.className = 'army-image';
                armyImg.src = `Equip${army.player}.jpg`;
                armyImg.alt = `Jugador ${army.player}`;
                
                const offsetX = imageIndex * 4;
                const offsetY = -imageIndex * 4;
                
                armyImg.style.left = offsetX + 'px';
                armyImg.style.top = offsetY + 'px';
                armyImg.style.zIndex = imageIndex;
                
                stack.appendChild(armyImg);
                imageIndex++;
              }
            }
            armyOverlay.appendChild(stack);
          }
        }
      }

      document.getElementById('blue-count').textContent = blueCount;
      document.getElementById('red-count').textContent  = redCount;
    }

    async function loadAndDraw() {
      try {
        const res = await fetch(SHEET_URL);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const text = await res.text();
        teamMap = parseGVizJSON(text);
      } catch(e) {
        console.warn('Error carregant el full:', e);
      }
      if (img.complete) drawAll();
      else img.addEventListener('load', drawAll);
    }

    loadAndDraw();
    window.addEventListener('resize', drawAll);
  </script>

  <div style="display:flex;gap:2.5rem;margin-top:1rem;font-family:'UnifrakturMaguntia',cursive;font-size:1.15rem;text-shadow:1px 1px 3px #000;">
    <span style="color:#4a96ff;">&#9632; Equip Blau &mdash; <span id="blue-count">27</span> hex</span>
    <span style="color:#e64646;">&#9632; Equip Vermell &mdash; <span id="red-count">27</span> hex</span>
  </div>
</body>
</html>
